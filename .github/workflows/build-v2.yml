name: Build V2

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - update

  push:
    branches:
      - main
    paths:
      - "automation/pyproject.toml"
      - "automation/uv.lock"
      - "**.py"
      - "config.json"
      - ".github/workflows/build-v2.yml"

  pull_request:
    branches:
      - main
    paths:
      - "automation/pyproject.toml"
      - "automation/uv.lock"
      - "**.py"
      - "config.json"
      - ".github/workflows/build-v2.yml"

permissions:
  contents: write

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Read JSON matrix
        id: set-matrix
        run: |
          matrix_json=$(cat config.json | jq -c '.')
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT

          echo "Generated matrix:"
          echo "$matrix_json" | jq '.'

  get-translations-backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Checkout and update the translation-backup submodule
        run: git submodule update --init --remote

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: translations-backup
          path: translations-backup
          include-hidden-files: false

  produce-csv:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs:
      - generate-matrix
      - get-translations-backup

    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: translations-backup
          path: translations-backup

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest

      - name: Install library and dependencies
        run: |
          cd automation
          uv sync --no-group dev
          pipx install poethepoet

      - name: Process po files
        run: |
          cd automation
          poe process_one_language ../ "${{ matrix.name }}" "${{ matrix.code }}" "${{ matrix.encoding }}"

